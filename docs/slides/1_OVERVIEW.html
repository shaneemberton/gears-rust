<h3 id="a-secure-modular-xaas-development-framework--middleware">A secure, modular XaaS development framework &amp; middleware</h3>
<p>By the <strong>Cyber Fabric Foundation</strong> · Apache-2.0</p>
<p><em>Composable building blocks · Defense-in-depth · Multi-tenancy · GenAI-ready</em></p>
</section>

<h1 id="part-1--what--why">Part 1 — What &amp; Why</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="4" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="what-is-constructor-gear">What is Constructor Gear?</h2>
<p>A <strong>Gear</strong> is the unit of composition in Constructor Gears.</p>
<p>Constructor Gears is a <strong>secure, modular XaaS development framework and middleware</strong> that helps you build XaaS products by composing gears:</p>
<ul>
<li><strong>Toolkit libraries</strong> for reusable platform building blocks — OData, canonical<br />
errors, secure DB ORM, API middleware, security, and more</li>
<li><strong>System gears</strong> for platform and control-plane capabilities — events, API<br />
gateway, auth, tenant resolution, registries, and outbound integration</li>
<li><strong>Domain gears</strong> for business capabilities — GenAI, OSS, and BSS services with<br />
ready-to-use public APIs</li>
</ul>
<p>Every layer has built-in <strong>Defense-in-depth</strong> - multi-tenancy, granular access control</p>
<blockquote>
<p>It is <strong>not</strong> a ready-to-use service — it is a set of well-integrated libraries<br />
that XaaS vendors <strong>compose into their own services and products</strong>.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="for-whom">For whom?</h2>
<ul>
<li><strong>XaaS / SaaS vendors</strong> building products on a governed, multi-tenant backbone</li>
<li><strong>Platform &amp; product teams</strong> who want security and tenancy <em>for free</em></li>
<li><strong>GenAI builders</strong> needing chat, RAG, model management, agents, tools</li>
<li><strong>On-prem / edge vendors</strong> shipping single-binary appliances</li>
<li><strong>Enterprises</strong> embedding Gears into an existing platform via plugins</li>
</ul>
<p>Vendors who use Gears decide <strong>which gears to include</strong>, <strong>how to combine them</strong>,<br />
and <strong>where to run them</strong> — from edge devices to Kubernetes clusters.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="non-goals">Non-goals</h2>
<p>Constructor Gears deliberately does <strong>not</strong>:</p>
<ol>
<li><strong>Optimize for minimalism / lowest barrier to entry</strong>
<ul>
<li>Prioritizes explicit structure, security, governance, and evolvability.</li>
</ul>
</li>
<li><strong>Ship a rich catalog of end-user services</strong>
<ul>
<li>It is the <em>foundation</em> on which vendors build complete SaaS offerings.</li>
</ul>
</li>
<li><strong>Replace cloud infrastructure or PaaS</strong>
<ul>
<li>Gears are libraries and building blocks, not a ready PaaS</li>
</ul>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="key-defining-characteristics">Key defining characteristics</h2>
<ol>
<li><strong>Secure by default (defense-in-depth)</strong> — security is structural, not opt-in, validated at build time.</li>
<li><strong>Architecture enforced at compile time</strong> - use custom lint rules via <code>dylint</code></li>
<li><strong>Three-tier gears hierarchy</strong> — toolkit, System gears, Service gears.</li>
<li><strong>Composable libraries, vendor-controlled deployment</strong> — own API + DB, SDK facades local vs. remote.</li>
<li><strong>Local-first shift-left development</strong> - run and test everything locally, LLM-friendly</li>
<li><strong>Pre-integrated XaaS backbone</strong> — tenancy, licensing, quota, usage, events — all replaceable via plugins.</li>
<li><strong>Extensible domain model and API data types</strong> via the Global Type System (GTS).</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-class="lead" data-theme="rose-pine-moon" lang="en-US" class="lead" data-marpit-pagination="8" style="--paginate:true;--class:lead;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h1 id="part-2--architecture-principles--philosophy">Part 2 — Architecture Principles &amp; Philosophy</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="principle-1--secure-by-default-defense-in-depth">Principle 1 — Secure by default (defense-in-depth)</h2>
<p>The architecture makes the <strong>insecure path harder than the secure one</strong>.<br />
The platform owns a <strong>linear security data-path</strong>:</p>
<ol>
<li><strong>Static checks</strong> — lints + CI catch violations at build time</li>
<li><strong>Authentication</strong> — gateway validates tokens → injects <code>SecurityContext</code></li>
<li><strong>Authorization</strong> — <code>PolicyEnforcer</code> → PDP → decision + constraints → <code>AccessScope</code></li>
<li><strong>DB scoping</strong> — <code>SecureConn</code> applies <code>AccessScope</code> as automatic <code>WHERE</code> clauses</li>
<li><strong>Credentials</strong> — <code>credstore</code>; <strong>Outbound</strong> — <code>oagw</code> egress policy</li>
</ol>
<blockquote>
<p>There is no &quot;unscoped&quot; shortcut to accidentally use.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="principle-2--architecture-enforced-at-compile-time">Principle 2 — Architecture enforced at compile time</h2>
<p>Custom static analysis is a <strong>core architectural mechanism</strong>, not a coding aid.</p>
<ul>
<li><code>tools/dylint_lints/</code> — a dedicated Dylint suite that checks:
<ul>
<li>contract-layer purity, DTO placement &amp; schema derives</li>
<li>domain-layer isolation, direct-SQL restrictions</li>
<li>versioned REST paths, mandatory <code>OperationBuilder</code> metadata</li>
<li>OData extension usage, GTS* identifier correctness</li>
</ul>
</li>
<li>Runs alongside Clippy + CI → <strong>violations fail fast, before review or runtime</strong></li>
</ul>
<blockquote>
<p>&quot;Shift-left&quot;: architecture that lives in markdown decays; Dylint makes it executable.<br />
GTS* = Global Type System identifers like <code>gts.cf.core.events.v1~a.b.c.d.v1~</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="dylint--compile-time-architecture-validation">Dylint — compile-time architecture validation</h2>
<p>Repository-specific lints in <code>tools/dylint_lints/</code> make the design <strong>executable</strong> — not just documented - code won't compile in case of violation:</p>
<ul>
<li><strong>Domain-layer isolation</strong> — no infra imports (<code>sqlx</code>, <code>sea_orm</code>, ...) in <code>domain/</code></li>
<li><strong>Direct-SQL restriction</strong> — raw SQL only in migration infrastructure</li>
<li><strong>Versioned REST paths</strong> — endpoints must be <code>/&lt;gear&gt;/v1/...</code></li>
<li><strong>Contract-layer purity</strong> — SDK/contract crates stay transport-agnostic</li>
<li><strong>Mandatory <code>OperationBuilder</code> metadata</strong> — auth posture, error responses, schemas declared</li>
<li><strong>OData extension usage</strong> — standardized <code>$filter</code> / <code>$orderby</code> / <code>$select</code> helpers</li>
<li><strong>GTS identifier correctness</strong> — valid IDs; no <code>schema_for!</code> on GTS structs</li>
<li>...</li>
</ul>
<blockquote>
<p>Runs Dylint in CI → architecture violations <strong>fail the build</strong> before review or runtime.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="principle-3--three-tier-gears-hierarchy">Principle 3 — Three-tier gears hierarchy</h2>
<table>
<thead>
<tr>
<th>Tier</th>
<th>Path</th>
<th>Role</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Toolkit</strong></td>
<td><code>libs/</code></td>
<td>Low-level substrate: API middleware, DB access, errors, transport, security, observability, macros</td>
</tr>
<tr>
<td><strong>System gears</strong></td>
<td><code>gears/system/</code></td>
<td>Control plane: API gateway, authn/authz, tenancy, events, resource groups, type registry</td>
</tr>
<tr>
<td><strong>Service gears</strong></td>
<td><code>gears/</code></td>
<td>Business/domain: serverless runtime, GenAI subsystems, chat, file parser</td>
</tr>
</tbody>
</table>
<p>All tiers follow the <strong>same</strong> Toolkit patterns, SDK conventions, and security model.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="principle-4--composable-libraries-vendor-controlled-deployment">Principle 4 — Composable libraries, vendor-controlled deployment</h2>
<ul>
<li>Constructor Gears <strong>ships libraries, not services</strong></li>
<li>Each gear is <strong>infrastructure-, DB- and deployment-agnostic</strong></li>
<li>Gears talk via a <strong>Rust-native SDK</strong> that facades local vs. remote calls</li>
<li>DB-agnostic persistence (SeaORM <code>SecureConn</code>) + infra-agnostic cluster primitives</li>
</ul>
<blockquote>
<p>Refactor internals freely — as long as the <strong>SDK contract</strong> stays compatible.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="principle-5--local-first-shift-left-development">Principle 5 — Local-first shift-left development</h2>
<p>Composable libraries make it possible to run the full business logic locally on a<br />
developer machine.</p>
<ul>
<li>Run gears locally to exercise real business logic — no Jenkins, Ansible, K8s</li>
<li>AI-assisted tooling can inspect the diff and suggest which tests should run</li>
<li>Coverage is easy to collect, and diff coverage makes it clear whether tests<br />
actually touched changed code</li>
<li>Fast feedback keeps regressions visible before CI and before any deployment</li>
</ul>
<blockquote>
<p>If it runs locally, it fails locally — long before a pipeline or release stage.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="principle-6--pre-integrated-xaas-backbone">Principle 6 — Pre-integrated XaaS backbone</h2>
<p>Deep, <em>built-in</em> integration with the typical XaaS backbone:</p>
<ul>
<li>Multi-tenancy · permissions &amp; roles· licensing &amp; quota · usage collection</li>
</ul>
<p>Every backbone concern is a <strong>regular, replaceable gear</strong> with its own SDK:</p>
<ul>
<li>Swap Constructor Gears' <code>authn-resolver</code>, <code>tenant-resolver</code>, etc. for <strong>vendor systems</strong></li>
<li>Integrate an existing product catalog / provisioning / license engine via <strong>plugins</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="principle-7--extensible-domain-model-via-gts">Principle 7 — Extensible domain model via GTS</h2>
<ul>
<li>Most gears expose an <strong>extensible domain model</strong></li>
<li>The <a href="https://github.com/globaltypesystem/gts-spec">Global Type System</a> provides<br />
versioned, schema-validated type definitions</li>
<li>Add new <strong>event types, settings, model attributes, permissions, license types</strong> —<br />
<em>without modifying existing gears</em></li>
<li><strong>Open-closed via plugins</strong>: host defines a plugin interface in its SDK; plugins<br />
register as scoped <code>ClientHub</code> clients keyed by GTS instance ID</li>
<li>CRUD handlers customizable via <strong>hooks/callbacks</strong> as serverless functions/workflows</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="engineering-principles-how-we-work">Engineering principles (how we work)</h2>
<ul>
<li><strong>Spec-Driven Development</strong> — PRD → Design &amp; ADR → Feature <em>before</em> code</li>
<li><strong>Code validation</strong> — custom Dylints + Clippy + tests + fuzzing + audits in CI</li>
<li><strong>Quality First</strong> — 90%+ coverage target across unit / integration / E2E / perf / security</li>
<li><strong>Core in Rust</strong> — compile-time safety + deep static analysis</li>
<li><strong>Monorepo</strong> — atomic refactors, consistent tooling, realistic local E2E</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-class="lead" data-theme="rose-pine-moon" lang="en-US" class="lead" data-marpit-pagination="18" style="--paginate:true;--class:lead;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h1 id="part-3--foundations">Part 3 — Foundations</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="why-rust">Why Rust?</h2>
<p>Building a <strong>platform layer for long-lived XaaS systems</strong> — concurrency,<br />
correctness, and maintainability matter more than raw implementation speed.</p>
<ul>
<li><strong>Compile-time safety</strong> — eliminates broad classes of memory &amp; concurrency bugs</li>
<li><strong>Great fit for reusable platform code</strong> — predictable perf, explicit interfaces</li>
<li><strong>Static analysis as architecture</strong> — Clippy + custom Dylints enforce rules at build</li>
<li><strong>Operational efficiency</strong> — low footprint → realistic local/edge runs &amp; E2E</li>
<li><strong>AI-friendly</strong> - great compiler and linters assistant to catch problems early</li>
<li><strong>Universal language</strong> — cloud/on-prem/edge, kernel + even frontend, mobile</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="why-a-monorepo">Why a monorepo?</h2>
<p>Constructor Gears is a <strong>co-evolving platform</strong>, not a loose collection of packages.</p>
<ul>
<li><strong>Atomic contract evolution</strong> — core contracts + all consumers updated together</li>
<li><strong>Shared quality gates</strong> — one set of lints, CI, tests, security scanning</li>
<li><strong>Integrated architecture validation</strong> — reqs, design, code and tests in one place</li>
<li><strong>AI-friendly development</strong> — single context improves the feedback loop</li>
<li><strong>Full traceability and index</strong> - suitable for autonomous &amp; LLM-assisted development</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="deployment-shapes-future">Deployment shapes (FUTURE)</h2>
<p>Same gear code &amp; API — three physical shapes via <code>runtime.type: local | oop</code>:</p>
<ul>
<li><strong>Single-node</strong> — all gears in one process → edge, on-prem appliances, dev/test</li>
<li><strong>Multi-node</strong> — gears across processes/machines over REST/gRPC, no orchestration → bare-metal on-prem</li>
<li><strong>Kubernetes</strong> — containerized services, full orchestration, cloud-native ops</li>
</ul>
<blockquote>
<p>Develop locally single-node → deploy bare-metal → scale to K8s, no rewrites.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="repository-structure">Repository structure</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">cyberware-rust/
├─ libs/            # Toolkit — runtime substrate (middleware, DB, errors, security, macros)
├─ gears/
│  ├─ system/       # Control plane (api-gateway, authn/authz, tenant, registries, oagw)
│  └─ &lt;service&gt;/    # Business/domain &amp; GenAI gears (mini-chat, file-parser, ...)
├─ apps/            # Executable apps composing gears (example server)
├─ examples/        # Reference gears (users-info, oop-gears, fips-probe)
├─ tools/           # Dylints, CI scripts, fuzz targets
└─ docs/            # Manifest, gears registry, toolkit_unified_system, arch, security
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-class="lead" data-theme="rose-pine-moon" lang="en-US" class="lead" data-marpit-pagination="23" style="--paginate:true;--class:lead;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h1 id="part-4--what-is-a-gear-in-a-nutshell">Part 4 — What is a Gear in a nutshell?</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="gear--independent-capability-domain">Gear = independent capability domain</h2>
<blockquote>
<p>A <strong>Gear</strong> is a self-contained, composable unit of business capability that plugs<br />
into the platform. Directory is still <code>gears/&lt;name&gt;/</code>.</p>
</blockquote>
<p>A Gear:</p>
<ul>
<li><strong>Owns its public API</strong> via an SDK crate (<code>&lt;name&gt;-sdk</code>) — traits, models, errors</li>
<li><strong>Owns its data</strong> behind <code>SecureConn</code> + <code>AccessScope</code> (no raw DB access)</li>
<li><strong>Is discovered at link time</strong> via <code>inventory</code>, initialized in dependency order</li>
<li><strong>Composes</strong> through the typed <code>ClientHub</code> (in-proc) or gRPC SDKs (remote)</li>
<li><strong>Is extensible</strong> via built-in or external plugins</li>
<li><strong>Published at crates.io</strong> independently with it's own version</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="gear-architecture-the-big-picture">Gear architecture (the big picture)</h2>
<p><img src="../img/gear_architecture.drawio.png" alt="" style="width:800px;height:550px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="planned-gears-map">Planned Gears map</h2>
<p><img src="../img/architecture.drawio.png" alt="" style="width:880px;height:550px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="gear-anatomy--ddd-light-layers">Gear anatomy — DDD-light layers</h2>
<table>
<thead>
<tr>
<th>Layer</th>
<th>Path</th>
<th>Responsibility</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>API</strong></td>
<td><code>src/api/rest/</code></td>
<td>DTOs, Axum handlers, <code>OperationBuilder</code> routes + OpenAPI. <strong>PEP entry point</strong></td>
</tr>
<tr>
<td><strong>Domain</strong></td>
<td><code>src/domain/</code></td>
<td>Business logic, SDK trait impl, <code>#[domain_model]</code> types, <strong>PEP enforcement</strong></td>
</tr>
<tr>
<td><strong>Infra</strong></td>
<td><code>src/infra/</code></td>
<td>SeaORM entities, repositories, migrations, adapters</td>
</tr>
</tbody>
</table>
<ul>
<li><strong>SDK-first</strong>: implementation depends on the SDK, never the reverse</li>
<li><code>#[domain_model]</code> macro <strong>rejects infra types</strong> (sqlx, axum, reqwest...) in domain</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="gear-execution-model">Gear execution model</h2>
<p>The <strong>logical model stays identical</strong> regardless of the physical boundary.</p>
<ul>
<li><strong>In-process (default)</strong> — gears share one runtime; communicate via typed <code>ClientHub</code> clients; wired by Tookit</li>
<li><strong>Out-of-process</strong> — gears as separate processes over <strong>gRPC</strong>
<ul>
<li><code>HostRuntime</code> OoP orchestration hooks</li>
<li><code>toolkit-transport-grpc</code> transport library</li>
<li><code>examples/oop-gears/</code> demonstrates the pattern</li>
</ul>
</li>
</ul>
<blockquote>
<p>Switch modes with a YAML field (<code>runtime.type</code>) — <strong>no code changes</strong>.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="gear-composition--compiled-in-vs-selectable">Gear composition — compiled-in vs selectable</h2>
<p>Constructor Gears favors <strong>explicit, reproducible composition</strong> over opaque runtime magic.</p>
<ul>
<li><strong>Core system gears</strong> are linked into the host binary and discovered via <code>inventory</code></li>
<li><strong>Optional gears/plugins</strong> are included by Cargo feature flags such as<br />
<code>mini-chat</code>, <code>static-authn</code>, <code>static-authz</code>, <code>static-credstore</code></li>
<li><strong>Feature flags decide what code is present</strong>; runtime config decides which vendor,<br />
plugin instance, or capability is used</li>
<li><strong>Built-in plugins</strong> run in-process and register scoped <code>ClientHub</code> clients</li>
<li><strong>External plugins/gears</strong> keep the same SDK contract but can run out-of-process over gRPC</li>
</ul>
<blockquote>
<p>Result: small vendor-specific binaries, deterministic SBOMs, and the same extension model locally or remotely.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="gear-lifecycle-platform-owned">Gear lifecycle (platform-owned)</h2>
<p><code>HostRuntime</code> runs a shared, ordered phase sequence:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">pre_init → DB migration → init → post_init(barrier)
        → REST wiring → gRPC wiring → start → ... → stop
</code></pre>
<ul>
<li>System gears run first where required</li>
<li><code>post_init</code> begins only after <strong>all</strong> <code>init</code> hooks complete</li>
<li>Shutdown runs in <strong>reverse dependency order</strong> with a graceful-stop deadline</li>
<li><strong>Cancellation tokens</strong> propagate so background work cooperates with shutdown</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="gear-categories">Gear categories</h2>
<p><img src="../img/gear_categories.drawio.png" alt="" style="width:800px;height:550px;" /></p>
<p><em>API Ingress · Business Logic · GenAI · Serverless · Core Functionality ·<br />
Core Platform Integration · Core Platform Services.</em> See <code>docs/GEARS.md</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="plugins--extensibility">Plugins &amp; extensibility</h2>
<ul>
<li><strong>Gateway Gear</strong> defines a plugin interface in its SDK + registers the plugin schema in the Types Registry</li>
<li><strong>Plugin Gears</strong> implement the interface, register as <strong>scoped <code>ClientHub</code> clients</strong> keyed by GTS instance ID</li>
<li>Host discovers plugins at runtime, routes to the selected one via a <code>vendor</code> config field</li>
<li><strong>Built-in plugin</strong> — compiled in, own business-logic crate + optional dedicated DB</li>
<li><strong>External plugin</strong> — separate deployable, own API handler + business logic + DB</li>
</ul>
<blockquote>
<p>Add a new backend (e.g. a custom auth provider) = write a plugin. Host stays unchanged.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-class="lead" data-theme="rose-pine-moon" lang="en-US" class="lead" data-marpit-pagination="33" style="--paginate:true;--class:lead;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h1 id="part-5--gears-toolkit">Part 5 — Gears Toolkit</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="gears-toolkit--mission">Gears Toolkit — mission</h2>
<p>Gears Toolkit is the <strong>central framework</strong> that turns the gear architecture into a <strong>reusable runtime discipline</strong>.</p>
<ul>
<li>Defines <strong>how gears are declared, discovered, wired, and operated</strong></li>
<li>Provides the <strong>secure-by-default</strong> substrate every Gear builds on</li>
<li>Makes route metadata, schemas, and contracts <strong>part of the architecture</strong>, not afterthoughts</li>
</ul>
<blockquote>
<p>One predictable operational model for every gear across every deployment shape.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="tookit--features">Tookit — features</h2>
<ul>
<li><strong>Inventory-based gear discovery</strong> → dependency-ordered registry</li>
<li><strong>Lifecycle orchestration</strong> (<code>HostRuntime</code> phases)</li>
<li><strong>Type-safe in-process communication</strong> (<code>ClientHub</code>)</li>
<li><strong>REST + OpenAPI composition</strong> (<code>OperationBuilder</code>, <code>OpenApiRegistry</code>)</li>
<li><strong>Gear-owned migrations</strong>, runtime-executed</li>
<li><strong>Security primitives</strong> (<code>SecurityContext</code>, <code>AccessScope</code>, secure ORM)</li>
<li><strong>SSE streaming</strong> (<code>SseBroadcaster&lt;T&gt;</code>, <code>sse_json&lt;T&gt;()</code>)</li>
<li><strong>Transactional outbox</strong> (exactly-once / leased, multi-DB)</li>
<li><strong>Observability</strong> (tracing, OTel, request IDs, health) · <strong>Typed config</strong> (<code>ExpandVars</code>)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="36" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="consistent-api-dialect">Consistent API dialect</h2>
<p><code>OperationBuilder</code> is the authoritative route-registration mechanism — one place declares:</p>
<ul>
<li>HTTP method + <strong>versioned path</strong> (<code>/resource-group/v1/groups</code>)</li>
<li><strong>Auth posture</strong> (<code>.authenticated()</code> / <code>.public()</code>) + <strong>license posture</strong></li>
<li>Request/response schemas, tags, summary, registered error responses</li>
</ul>
<p>Result:</p>
<ul>
<li>Uniform <strong>OpenAPI</strong> publication through the gateway</li>
<li>Same pagination / filter / order (<strong>OData</strong> <code>$filter</code>, <code>$select</code>, <code>$orderby</code>)</li>
<li>Consistent auth, rate-limit, timeout, and observability behavior</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="api-handler-registration-example">API handler registration example</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-rust"><span class="hljs-keyword">pub</span> <span class="hljs-keyword">fn</span> <span class="hljs-title function_">register_routes</span>(
    <span class="hljs-keyword">mut</span> router: Router,
    openapi: &amp;<span class="hljs-keyword">dyn</span> OpenApiRegistry,
    service: Arc&lt;ConcreteService&gt;,
) <span class="hljs-punctuation">-&gt;</span> Router {
    router = OperationBuilder::<span class="hljs-title function_ invoke__">get</span>(<span class="hljs-string">&quot;/simple-user-settings/v1/settings&quot;</span>)
        .<span class="hljs-title function_ invoke__">operation_id</span>(<span class="hljs-string">&quot;simple_user_settings.get_settings&quot;</span>)
        .<span class="hljs-title function_ invoke__">summary</span>(<span class="hljs-string">&quot;Get user settings&quot;</span>)
        .<span class="hljs-title function_ invoke__">authenticated</span>()
        .require_license_features::&lt;License&gt;([])
        .<span class="hljs-title function_ invoke__">handler</span>(handlers::get_settings)
        .json_response_with_schema::&lt;dto::SimpleUserSettingsDto&gt;(
            openapi,
            StatusCode::OK,
            <span class="hljs-string">&quot;Settings retrieved&quot;</span>,
        )
        .<span class="hljs-title function_ invoke__">error_401</span>(openapi)
        .<span class="hljs-title function_ invoke__">error_500</span>(openapi)
        .<span class="hljs-title function_ invoke__">register</span>(router, openapi);

    router.<span class="hljs-title function_ invoke__">layer</span>(<span class="hljs-title function_ invoke__">Extension</span>(service))
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-class="lead" data-theme="rose-pine-moon" lang="en-US" class="lead" data-marpit-pagination="38" style="--paginate:true;--class:lead;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h1 id="part-6--cross-cutting-concerns">Part 6 — Cross-cutting Concerns</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="39" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="request-lifecycle">Request lifecycle</h2>
<p><img src="../img/request_sequence.png" alt="" style="width:800px;height:550px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="40" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="request-lifecycle--who-owns-what">Request lifecycle — who owns what</h2>
<ul>
<li><strong>API Gateway</strong> owns <strong>authentication</strong> (token → <code>SecurityContext</code>) and fast <strong>license</strong> validation</li>
<li><strong>Gear domain services</strong> own <strong>licensing</strong> and <strong>authorization</strong> — call <code>PolicyEnforcer</code> (PEP)</li>
<li><strong>AuthZ Resolver</strong> (PDP) returns a decision + <strong>row-level constraints</strong></li>
<li>Constraints compile to an <strong><code>AccessScope</code></strong> → <code>SecureConn</code> applies SQL <code>WHERE</code></li>
<li>Gear code <strong>never</strong> parses tokens or resolves tenancy directly</li>
</ul>
<p>Gateway middleware order:<br />
<code>SetRequestId → Trace → Timeout → BodyLimit → CORS → MIME → RateLimit → ErrorMapping → Auth → ScopeEnforcement → License → Router</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="41" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="security--pdppep-authorization">Security — PDP/PEP authorization</h2>
<p><strong>PDP</strong> — the Policy Decision Point that evaluates authorization policies.<br />
<strong>PEP</strong> — the Policy Enforcement Point that applies the decision in the gear.</p>
<p><strong>NIST SP 800-162 PDP/PEP</strong> model, built on OpenID <strong>AuthZEN</strong> + query-level constraints.</p>
<ul>
<li><strong>PDP</strong> (AuthZ Resolver plugin) — evaluates policies (RBAC/ABAC/ReBAC, vendor's choice)</li>
<li><strong>PEP</strong> (domain gear) — compiles constraints into SQL <code>WHERE</code> clauses</li>
<li>Returns <strong>predicates</strong>, not resource IDs → O(1) authz overhead, correct pagination, accurate counts</li>
<li><strong>Fail-closed</strong>: denied / unreachable PDP / missing constraints → <strong>403</strong></li>
</ul>
<blockquote>
<p><code>effective_access = min(token_scopes, user_permissions)</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="42" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="security--secure-orm--tenancy">Security — Secure ORM &amp; tenancy</h2>
<ul>
<li>Entities derive <strong><code>Scopable</code></strong> with <code>#[secure(tenant_col, resource_col, owner_col, type_col)]</code></li>
<li><code>AccessScope</code> carries four dimensions: <strong>tenant, resource, owner, type</strong></li>
<li><code>SecureConn</code> auto-maps PEP properties → columns → <code>WHERE</code> clauses</li>
<li><strong>Tenant topology</strong>: single-root hierarchy; every resource has <code>owner_tenant_id</code></li>
<li><strong>Barriers</strong> (e.g. <code>self_managed</code>) restrict parent visibility into subtrees</li>
<li><strong>Resource groups</strong> add optional access-control grouping within tenants</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="43" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="security--defense-across-the-lifecycle">Security — defense across the lifecycle</h2>
<ul>
<li><strong>Rust safety baseline</strong> — memory safety, strict lints</li>
<li><strong>Split AuthN / AuthZ</strong> as separate system services</li>
<li><strong><code>SecurityContext</code> propagation</strong> — explicit data, no thread-local magic</li>
<li><strong>Outbound boundary</strong> — <code>oagw</code> centralizes egress policy + credential injection</li>
<li><strong>Credential handling</strong> — <code>credstore</code> + <code>secrecy</code>-aware types</li>
<li><strong>Static &amp; CI gates</strong> — Clippy, Dylints, <code>cargo-deny</code>, CodeQL, fuzzing, Scorecard/Snyk/Aikido</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="44" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="security--fips-140-3">Security — FIPS 140-3</h2>
<p>Build with <code>--features fips</code> to route TLS crypto through a <strong>FIPS 140-3 validated module</strong>:</p>
<table>
<thead>
<tr>
<th>Target</th>
<th>Validated module</th>
</tr>
</thead>
<tbody>
<tr>
<td>macOS</td>
<td>Apple <code>corecrypto</code> (per-OS CMVP cert)</td>
</tr>
<tr>
<td>Windows</td>
<td>Microsoft Windows CNG</td>
</tr>
<tr>
<td>Linux</td>
<td>AWS-LC FIPS Provider</td>
</tr>
</tbody>
</table>
<ul>
<li>One <code>rustls 0.23</code> state machine, pluggable <code>CryptoProvider</code> per OS</li>
<li>Offers <strong>only</strong> FIPS-approved suites (AES-GCM, P-256/384, SHA-256/384)</li>
<li><strong>Fails closed</strong> on Windows when OS FIPS mode is off</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="45" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="global-type-system-gts">Global Type System (GTS)</h2>
<p>A powerful <strong>extension-point architecture</strong> — virtually every API can be extended<br />
without modifying core code.</p>
<ul>
<li>Globally unique, human-readable, <strong>versioned</strong> identifiers for types &amp; instances</li>
<li><code>gts.cf.core.events.event.v1~</code> style IDs as a <strong>platform contract surface</strong></li>
<li>GTS <strong>JSON Schemas generated directly from Rust types</strong> → registered in Types Registry</li>
<li>The non-HTTP counterpart to OpenAPI: describes <strong>plugin specs, events, permissions</strong></li>
<li>GTS-specific <strong>Dylints</strong> validate identifier correctness</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="46" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="errors--canonical-taxonomy">Errors — canonical taxonomy</h2>
<p>One platform-wide error vocabulary, aligned with the <strong>16 gRPC categories</strong>:</p>
<ul>
<li><code>NotFound</code>, <code>AlreadyExists</code>, <code>PermissionDenied</code>, <code>InvalidArgument</code>, <code>Unauthenticated</code>, ... (16 total)</li>
<li>Each category: typed context + HTTP mapping + <strong>stable GTS type identifier</strong></li>
<li>Rendered as <strong>RFC-9457 <code>Problem</code></strong> documents over HTTP</li>
<li>Aligns REST · SDK boundaries · future gRPC · retry classification</li>
</ul>
<blockquote>
<p>Foundation implemented (<code>libs/toolkit-canonical-errors</code>); repo-wide migration in progress.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="47" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="observability--operations">Observability &amp; operations</h2>
<ul>
<li><strong>OpenTelemetry</strong> tracing (<code>libs/toolkit/src/telemetry/</code>)</li>
<li><strong>API Gateway</strong>: request IDs, tracing, timeout layers, body limits, structured access logs</li>
<li><strong>Health endpoints</strong>: <code>/health</code> (detailed JSON) and <code>/healthz</code> (liveness)</li>
<li><strong>Governor-based rate limiting</strong> with policy headers + inflight semaphores</li>
<li>CI workflows + test infrastructure aligned with operational quality</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-class="lead" data-theme="rose-pine-moon" lang="en-US" class="lead" data-marpit-pagination="48" style="--paginate:true;--class:lead;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h1 id="part-7--engineering--developer-experience">Part 7 — Engineering &amp; Developer Experience</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="49" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="developer-experience">Developer experience</h2>
<ul>
<li><strong>Golden path</strong> templates for new Gears (SDK + gear crate scaffolding)</li>
<li><strong>Type-safe REST</strong> — <code>OperationBuilder</code> prevents half-wired routes at compile time</li>
<li><strong>OpenAPI auto-generated</strong> from the same route declarations that run the service</li>
<li><strong><code>GET /cw/docs</code></strong> live Swagger UI on the example server</li>
<li><strong>Architectural Dylints</strong> enforce design rules and patterns at build time</li>
<li><strong>Rich docs</strong>: <code>docs/toolkit_unified_system/</code> (13 topic files) + per-gear specs</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="50" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="spec-driven-development-sdd">Spec-Driven Development (SDD)</h2>
<p>Large features start with <strong>specs that live alongside the code</strong>:</p>
<ul>
<li><strong>PRD</strong> — vision, actors, capabilities, use cases, FR/NFR</li>
<li><strong>DESIGN</strong> — architecture, principles, constraints, domain model, API contracts</li>
<li><strong>ADR</strong> — decisions, options, trade-offs, consequences</li>
<li><strong>FEATURE</strong> — flows, algorithms, states, requirements</li>
<li><strong>UPSTREAM_REQS</strong> — incoming technical requirements from other gears</li>
</ul>
<blockquote>
<p>Templates in <code>docs/spec-templates/</code>. Every gear is well documented.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="51" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="testing-architecture">Testing architecture</h2>
<p>A <strong>dual-layer</strong> strategy with an explicit <strong>zero-overlap</strong> rule:</p>
<ul>
<li><strong>Unit &amp; integration</strong> — in-process, SQLite <code>:memory:</code>, <strong>mocked AuthZ</strong>
<ul>
<li>domain invariants, validation, error chains, DTO conversions, seeding — <em>no HTTP, no real DB</em></li>
</ul>
</li>
<li><strong>End-to-end</strong> — pytest vs. a running <code>cyberware-server</code> with a <strong>real DB</strong>
<ul>
<li>JSON wire format, real AuthZ wiring, DB-specific SQL, cross-gear SDK boundaries</li>
</ul>
</li>
</ul>
<p>Unit-test gate: (1) deterministic domain logic? (2) atomic &amp; fast? (3) removing it lowers confidence?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-class="lead" data-theme="rose-pine-moon" lang="en-US" class="lead" data-marpit-pagination="52" style="--paginate:true;--class:lead;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h1 id="part-8--getting-started">Part 8 — Getting Started</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="53" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="prerequisites">Prerequisites</h2>
<ul>
<li><strong>Rust stable</strong> with Cargo (Edition 2024, MSRV 1.95.0)</li>
<li><strong><code>protoc</code></strong> (Protocol Buffers compiler)
<ul>
<li>macOS: <code>brew install protobuf</code> · Linux: <code>apt-get install protobuf-compiler</code></li>
</ul>
</li>
<li><strong>MariaDB / PostgreSQL / SQLite</strong> or in-memory database</li>
<li><strong>Agentic IDE</strong>: VS Code with <strong>rust-analyzer</strong> or similar</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="54" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="how-to-build--run">How to build &amp; run</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">git <span class="hljs-built_in">clone</span> --recurse-submodules &lt;repository-url&gt;
<span class="hljs-built_in">cd</span> cyberware-rust

make build      <span class="hljs-comment"># build libs + example server</span>
make example    <span class="hljs-comment"># run the example server</span>
<span class="hljs-comment"># → API docs at http://127.0.0.1:8087/cw/docs</span>

<span class="hljs-comment"># Health checks</span>
curl http://127.0.0.1:8087/cw/health   <span class="hljs-comment"># detailed JSON</span>
curl http://127.0.0.1:8087/healthz      <span class="hljs-comment"># liveness &quot;ok&quot;</span>
</code></pre>
<p>Run modes: SQLite (<code>config/quickstart.yaml</code>), no-DB (<code>config/no-db.yaml</code>), or <code>--mock</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="55" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="configuration">Configuration</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">server:</span>   { <span class="hljs-attr">home_dir:</span> <span class="hljs-string">&quot;~/.cyberware&quot;</span> }
<span class="hljs-attr">database:</span> { <span class="hljs-attr">url:</span> <span class="hljs-string">&quot;sqlite://database/database.db&quot;</span>, <span class="hljs-attr">max_conns:</span> <span class="hljs-number">10</span> }
<span class="hljs-attr">gears:</span>
  <span class="hljs-attr">api_gateway:</span>
    <span class="hljs-attr">config:</span> { <span class="hljs-attr">bind_addr:</span> <span class="hljs-string">&quot;127.0.0.1:8087&quot;</span>, <span class="hljs-attr">enable_docs:</span> <span class="hljs-literal">true</span> }
  <span class="hljs-attr">users_info:</span>
    <span class="hljs-attr">database:</span> { <span class="hljs-attr">server:</span> <span class="hljs-string">&quot;sqlite_users&quot;</span>, <span class="hljs-attr">file:</span> <span class="hljs-string">&quot;users_info.db&quot;</span> }
    <span class="hljs-attr">config:</span>   { <span class="hljs-attr">default_page_size:</span> <span class="hljs-number">5</span>, <span class="hljs-attr">max_page_size:</span> <span class="hljs-number">100</span> }
</code></pre>
<p>Env overrides with <code>CYBERFABRIC_</code> prefix, e.g.<br />
<code>CYBERFABRIC_DATABASE_URL=postgres://...</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="56" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="how-to-run-tests">How to run tests</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">make check           <span class="hljs-comment"># full quality gate: fmt + clippy + test + security</span>
make <span class="hljs-built_in">test</span>            <span class="hljs-comment"># unit tests (workspace)</span>
make test-sqlite     <span class="hljs-comment"># integration tests (SQLite, no external DB)</span>
make e2e-local       <span class="hljs-comment"># E2E — builds + starts server automatically</span>
make coverage-unit   <span class="hljs-comment"># unit-test coverage</span>

</code></pre>
<p>On <strong>Windows</strong> (no <code>make</code>): <code>python tools/scripts/ci.py check</code></p>
<blockquote>
<p>Full strategy &amp; CI details: <code>docs/TESTING.md</code>.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="57" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="how-to-contribute">How to contribute</h2>
<ol>
<li><strong>Branch / fork</strong> — <code>feature/&lt;name&gt;</code>, <code>fix/&lt;name&gt;</code>, <code>docs/&lt;name&gt;</code></li>
<li><strong>Spec-first</strong> for large features (PRD/DESIGN/ADR/FEATURE templates)</li>
<li><strong>Code</strong> to guidelines (<code>guidelines/DNA/...</code>), kebab-case gear dirs, add tests</li>
<li><strong>Quality gate</strong> — <code>make check</code> (or <code>ci.py check</code>); aim high on coverage</li>
<li><strong>DCO sign-off</strong> — <code>git commit -s</code></li>
<li><strong>Conventional commits</strong> — <code>feat(auth): ...</code>, <code>fix(ui): ...</code></li>
<li><strong>Open PR</strong> → CI green + 1 maintainer approval + conversations resolved</li>
<li><strong>Local AI review</strong> — <code>cypilot review PR &lt;number&gt;</code></li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="rose-pine-moon" lang="en-US" data-marpit-pagination="58" style="--paginate:true;--theme:rose-pine-moon;" data-marpit-pagination-total="60">
<h2 id="documentation-map">Documentation map</h2>
<ul>
<li><strong>Architecture Manifest</strong> — <code>docs/ARCHITECTURE_MANIFEST.md</code>defining characteristics</li>
