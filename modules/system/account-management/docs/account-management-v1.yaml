# Created:  2026-04-19 by Virtuozzo
# Updated:  2026-04-19 by Virtuozzo

openapi: 3.1.0
info:
  title: Account Management API
  version: 1.0.0
  description: |
    Account Management (AM) is the authoritative control-plane API for tenant
    hierarchy, tenant mode transitions, delegated user lifecycle operations,
    and extensible tenant metadata.

    This file is the authoritative machine-readable public contract for AM v1.
    PRD and DESIGN intentionally summarize behavior and refer here for wire
    shapes, field semantics, and HTTP-level error mapping.

    Versioning: breaking changes increment the major version embedded in the URL
    path (`/api/account-management/v1/` → `/v2/`) and are coordinated with a
    migration window per the Compatibility NFR in DESIGN.md. Additive changes
    within v1 do not rev the path.

    **Implementation status:** This PR lands the domain-layer
    services for conversion requests (managed↔self-managed mode flips) and
    IdP user-ops (`provision_user` / `deprovision_user` / `list_users`),
    but does NOT publish their REST surfaces — the `/conversions`,
    `/child-conversions`, and `/users` paths are intentionally absent
    from this v1 contract. They land together with their handlers in
    the follow-up REST PR (`cyberfabric-core#1813`). Pre-merging the
    paths here would publish a contract that the server cannot satisfy:
    standard OpenAPI codegen tools ignore `x-status` annotations and
    generate clients that would hit `404 Not Found` at runtime. The
    forward-looking schema shapes (`OwnConversionRequest`,
    `ChildConversionRequest`, `UserSummary`, etc.) remain in
    `#/components/schemas` so the handler PR ships paths + schemas
    in one cohesive diff without re-introducing dangling type
    definitions.

servers:
  - url: https://api.example.com

tags:
  - name: tenants
    description: Tenant hierarchy lifecycle and direct-child discovery.
  - name: metadata
    description: Tenant-scoped extensible metadata and effective-value resolution.
  # `conversions` and `users` tags ship together with their paths in
  # cyberfabric-core#1813 (REST handler PR). The domain-layer services
  # (`ConversionService`, `UserService`) and their forward-looking
  # schema shapes are already part of this contract; only the path
  # surface is deferred.

# Default security requirement applied to every operation. AM has no
# public endpoints — the entire surface is tenant-scoped control-plane
# and requires bearer authentication. No scopes are declared in the
# spec: the `bearerAuth` scheme is `type=http, scheme=bearer`, which
# under OpenAPI 3.x cannot carry scope arrays (scopes are valid only
# for `oauth2` / `openIdConnect` schemes). Authorization mapping —
# which permissions are required for which operation — is configured
# downstream by the deploying operator (AuthZ Resolver policy / IdP
# claim mapping), not pinned in this contract.
security:
  - bearerAuth: []

paths:
  /api/account-management/v1/tenants:
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create a child tenant
      description: |
        Creates a non-root tenant under an existing parent tenant. The server
        validates tenant type compatibility, hierarchy constraints, and tenant
        mode selection before invoking the configured IdP tenant-provisioning
        contract.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantCreateRequest'
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '4XX':
          $ref: '#/components/responses/Problem'
        '5XX':
          $ref: '#/components/responses/Problem'

  /api/account-management/v1/tenants/{tenant_id}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    get:
      operationId: getTenant
      tags: [tenants]
      summary: Read tenant details
      responses:
        '200':
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Update mutable tenant fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUpdateRequest'
      responses:
        '200':
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteTenant
      tags: [tenants]
      summary: Soft-delete a tenant
      responses:
        '200':
          description: Tenant soft-deleted or already deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        default:
          $ref: '#/components/responses/Problem'

  /api/account-management/v1/tenants/{tenant_id}/children:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/Top'
      - $ref: '#/components/parameters/Skip'
      - $ref: '#/components/parameters/StatusFilter'
    get:
      operationId: listChildren
      tags: [tenants]
      summary: List direct children of a tenant
      responses:
        '200':
          description: Page of direct child tenants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantPage'
        default:
          $ref: '#/components/responses/Problem'

  # /api/account-management/v1/tenants/{tenant_id}/conversions
  # /api/account-management/v1/tenants/{tenant_id}/conversions/{request_id}
  # /api/account-management/v1/tenants/{tenant_id}/child-conversions
  # /api/account-management/v1/tenants/{tenant_id}/child-conversions/{request_id}
  # /api/account-management/v1/tenants/{tenant_id}/users
  # /api/account-management/v1/tenants/{tenant_id}/users/{user_id}
  #
  # Conversion-request and IdP user-ops REST paths land with their
  # handlers in cyberfabric-core#1813. This PR ships only the
  # domain-layer services (`ConversionService`, `UserService`) and
  # their forward-looking schema shapes (`OwnConversionRequest`,
  # `ChildConversionRequest`, `UserSummary`, etc. under
  # `#/components/schemas`). Publishing the paths here without
  # handlers would have generators emit clients hitting `404 Not
  # Found` at runtime — standard OpenAPI tooling does not honor
  # vendor `x-status` annotations.

  /api/account-management/v1/tenants/{tenant_id}/metadata:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/Top'
      - $ref: '#/components/parameters/Skip'
    get:
      operationId: listTenantMetadata
      tags: [metadata]
      summary: List metadata entries written directly on a tenant
      responses:
        '200':
          description: Page of tenant metadata entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantMetadataPage'
        default:
          $ref: '#/components/responses/Problem'

  /api/account-management/v1/tenants/{tenant_id}/metadata/{schema_id}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/SchemaId'
    get:
      operationId: getTenantMetadata
      tags: [metadata]
      summary: Read a tenant's direct metadata entry
      responses:
        '200':
          description: Tenant metadata entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantMetadataEntry'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: putTenantMetadata
      tags: [metadata]
      summary: Create or replace a tenant metadata entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantMetadataValue'
      responses:
        '200':
          description: Metadata entry stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantMetadataEntry'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteTenantMetadata
      tags: [metadata]
      summary: Delete a tenant metadata entry
      responses:
        '200':
          description: Metadata entry deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantMetadataDeletionResult'
        default:
          $ref: '#/components/responses/Problem'

  /api/account-management/v1/tenants/{tenant_id}/metadata/{schema_id}/resolved:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/SchemaId'
    get:
      operationId: resolveTenantMetadata
      tags: [metadata]
      summary: Resolve the effective metadata value for a tenant and schema
      responses:
        '200':
          description: Effective metadata value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvedTenantMetadata'
        default:
          $ref: '#/components/responses/Problem'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantId:
      name: tenant_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RequestId:
      name: request_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
        description: IdP-issued UUID user identifier.
    SchemaId:
      name: schema_id
      in: path
      required: true
      schema:
        type: string
        description: Full chained GTS schema identifier.
    UserIdFilter:
      name: user_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
        description: Optional UUID user identifier filter for point lookup behavior.
    Top:
      name: $top
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Skip:
      name: $skip
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    StatusFilter:
      name: status
      in: query
      required: false
      description: |
        Optional tenant-status filter. One of: `active`, `suspended`, `deleted`.
        Omit to include all statuses.
      schema:
        $ref: '#/components/schemas/TenantStatus'
    ConversionStatusFilter:
      name: status
      in: query
      required: false
      schema:
        oneOf:
          - $ref: '#/components/schemas/ConversionStatus'
          - type: string
            enum: [any]
        default: pending

  responses:
    Problem:
      description: RFC 9457 problem response
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    EmptyObject:
      type: object
      additionalProperties: false

    TenantStatus:
      type: string
      enum: [active, suspended, deleted]

    TenantMode:
      type: string
      enum: [managed, self_managed]

    ConversionStatus:
      type: string
      enum: [pending, approved, cancelled, rejected, expired]

    PageInfo:
      type: object
      additionalProperties: false
      required: [top, skip]
      properties:
        top:
          type: integer
        skip:
          type: integer
        total:
          type: [integer, 'null']
          format: int64

    Tenant:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - parent_id
        - tenant_type
        - status
        - self_managed
        - depth
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 255
        parent_id:
          type: [string, 'null']
          format: uuid
        tenant_type:
          type: string
          description: Full chained GTS schema identifier for the tenant type.
        status:
          $ref: '#/components/schemas/TenantStatus'
        self_managed:
          type: boolean
        depth:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: [string, 'null']
          format: date-time

    TenantCreateRequest:
      type: object
      additionalProperties: false
      required: [name, parent_id, tenant_type]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        parent_id:
          type: string
          format: uuid
        tenant_type:
          type: string
        self_managed:
          type: boolean
          default: false
        provisioning_metadata:
          type: [object, 'null']
          additionalProperties: true
          description: Opaque provider-specific provisioning context forwarded to the IdP contract.

    TenantUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        status:
          type: string
          enum: [active, suspended]

    TenantPage:
      type: object
      additionalProperties: false
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
        page_info:
          $ref: '#/components/schemas/PageInfo'

    OwnConversionRequest:
      type: object
      additionalProperties: false
      required:
        - id
        - tenant_id
        - target_mode
        - initiator_side
        - status
        - requested_by
        - created_at
        - expires_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        target_mode:
          $ref: '#/components/schemas/TenantMode'
        initiator_side:
          type: string
          enum: [child, parent]
        status:
          $ref: '#/components/schemas/ConversionStatus'
        requested_by:
          type: string
          format: uuid
        approved_by:
          type: [string, 'null']
          format: uuid
        cancelled_by:
          type: [string, 'null']
          format: uuid
        rejected_by:
          type: [string, 'null']
          format: uuid
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChildConversionRequest:
      type: object
      additionalProperties: false
      required:
        - id
        - child_tenant_id
        - child_tenant_name
        - target_mode
        - initiator_side
        - status
        - requested_by
        - created_at
        - expires_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        child_tenant_id:
          type: string
          format: uuid
        child_tenant_name:
          type: string
        target_mode:
          $ref: '#/components/schemas/TenantMode'
        initiator_side:
          type: string
          enum: [child, parent]
        status:
          $ref: '#/components/schemas/ConversionStatus'
        requested_by:
          type: string
          format: uuid
        approved_by:
          type: [string, 'null']
          format: uuid
        cancelled_by:
          type: [string, 'null']
          format: uuid
        rejected_by:
          type: [string, 'null']
          format: uuid
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OwnConversionRequestPage:
      type: object
      additionalProperties: false
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OwnConversionRequest'
        page_info:
          $ref: '#/components/schemas/PageInfo'

    ChildConversionRequestPage:
      type: object
      additionalProperties: false
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ChildConversionRequest'
        page_info:
          $ref: '#/components/schemas/PageInfo'

    ChildConversionCreateRequest:
      type: object
      additionalProperties: false
      required: [child_tenant_id]
      properties:
        child_tenant_id:
          type: string
          format: uuid

    ConversionPatchRequest:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, cancelled, rejected]

    UserCreateRequest:
      type: object
      additionalProperties: false
      required: [username]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: [string, 'null']
          format: email
          description: Optional contact email surfaced through the projection.
        display_name:
          type: [string, 'null']
          description: Optional display name surfaced through the projection.

    UserSummary:
      type: object
      additionalProperties: false
      required: [id, username]
      properties:
        id:
          type: string
          format: uuid
          description: IdP-issued UUID user identifier.
        username:
          type: string
        email:
          type: [string, 'null']
          format: email
        display_name:
          type: [string, 'null']

    UserPage:
      type: object
      additionalProperties: false
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserSummary'
        page_info:
          $ref: '#/components/schemas/PageInfo'

    UserDeletionResult:
      type: object
      additionalProperties: false
      required: [user_id, deleted]
      properties:
        user_id:
          type: string
          format: uuid
          description: Deleted IdP-issued UUID user identifier.
        deleted:
          type: boolean

    TenantMetadataValue:
      type: object
      description: GTS-schema-validated metadata payload.
      additionalProperties: true

    TenantMetadataEntry:
      type: object
      additionalProperties: false
      required: [tenant_id, schema_id, value, created_at, updated_at]
      properties:
        tenant_id:
          type: string
          format: uuid
        schema_id:
          type: string
        value:
          $ref: '#/components/schemas/TenantMetadataValue'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TenantMetadataPage:
      type: object
      additionalProperties: false
      required: [items, page_info]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TenantMetadataEntry'
        page_info:
          $ref: '#/components/schemas/PageInfo'

    ResolvedTenantMetadata:
      type: object
      additionalProperties: false
      required: [tenant_id, schema_id, resolved]
      properties:
        tenant_id:
          type: string
          format: uuid
        schema_id:
          type: string
        resolved:
          type: boolean
          description: Whether an effective value was found.
        source_tenant_id:
          type: [string, 'null']
          format: uuid
        value:
          $ref: '#/components/schemas/TenantMetadataValue'

    TenantMetadataDeletionResult:
      type: object
      additionalProperties: false
      required: [tenant_id, schema_id, deleted]
      properties:
        tenant_id:
          type: string
          format: uuid
        schema_id:
          type: string
        deleted:
          type: boolean

    Problem:
      type: object
      additionalProperties: true
      required: [type, title, status, detail, context]
      description: |
        RFC 9457 problem+json envelope produced by `modkit-canonical-errors`.

        Discrimination model:
          * `type` carries the canonical-error category as a `gts://` URI
            (e.g. `gts://gts.cf.core.errors.err.v1~cf.core.err.service_unavailable.v1~`).
            This is the stable broad-category discriminator across all modules.
          * `status` carries the HTTP status (e.g. `503`).
          * `context` is a per-category structured object documented in
            `modkit-canonical-errors`. Categories that carry a finer reason
            token expose it as `context.reason` (e.g. `PermissionDenied` →
            `context.reason = "cross_tenant_denied"`, `FailedPrecondition` →
            `context.reason = "tenant_depth_exceeded"`).
          * `ResourceExhausted` carries `context.quota_violations[].subject`
            (e.g. `"integrity_check"`) for the exhaustion-source
            identifier rather than a top-level reason.

        AM-internal 503 subsources (IdP-unavailable, IdP-unsupported-operation)
        are intentionally NOT exposed as public discriminators on the
        `service_unavailable` envelope. The 503 envelope is opaque to
        external clients by design: retry-after semantics are uniform
        across all 503 sources, so a sub-source code adds no actionable
        signal to consumers. Provider-supplied diagnostic detail (vendor
        SDK strings, hostnames, internal endpoint names) is redacted
        before it reaches the public envelope to avoid information
        disclosure. AM-internal subsource forensics live server-side on
        `am.dependency_health{target="idp", op=*, outcome=*}` and the
        `am.bootstrap_lifecycle` family for operators; correlate via
        `trace_id` to the structured `am.domain` warn-log that carries
        the redacted provider-detail digest.
      properties:
        type:
          type: string
          format: uri-reference
          description: Canonical-error category URI. Stable broad-category discriminator.
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        trace_id:
          type: string
        context:
          type: object
          additionalProperties: true
          description: |
            Per-category structured context. Schema varies by canonical
            category; common AM-relevant fields include:
              * `retry_after_seconds` (`ServiceUnavailable`)
              * `reason` (`PermissionDenied`, `FailedPrecondition`,
                 `Aborted`, `Unauthenticated`)
              * `quota_violations` (`ResourceExhausted`)
              * `precondition_violations` (`FailedPrecondition`)
              * `field_violations` (`InvalidArgument`)
              * `resource_type`, `resource_name` (NotFound, AlreadyExists,
                 ServiceUnavailable)
        details:
          type: object
          additionalProperties: true
