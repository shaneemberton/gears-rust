# Account Management module — example operator configuration.
#
# Reference docs:
#   - DESIGN.md §3.1 (hierarchy depth defaults), §3.5 (resource-ownership probe),
#     §4.3 (fail-closed on missing AuthZ resolver)
#   - PRD.md  (depth-threshold semantics, retention defaults)
#   - features/feature-tenant-hierarchy-management.md (retention + reaper pipelines)
#
# Schema source of truth: cyberware-account-management `crate::config::AccountManagementConfig`.
# The struct is split into sub-sections (`listing`, `hierarchy`, `retention`,
# `reaper`, `idp`) so related knobs travel together. Defaults below match
# `Default::default()` and `validate()` rejects `0` / out-of-range values for
# the load-bearing knobs (see inline notes).
#
# `#[serde(default, deny_unknown_fields)]` is set on every section, so:
#   - every field is OPTIONAL — omitted fields fall back to the default shown here
#   - any UNKNOWN field rejects module init (loud misconfig surface)
#
# All durations are integer seconds (no humantime parsing on this module).

# =============================================================================
# Listing — pagination clamps for collection endpoints
# =============================================================================
listing:
  # Hard cap on `$top` for `listChildren`; matches OpenAPI `Top.maximum`.
  # `validate()` rejects `0` (would empty every page).
  max_top: 200

# =============================================================================
# Hierarchy — depth gating (DESIGN §3.1 / PRD)
# =============================================================================
hierarchy:
  # false → emit advisory log + metric at the threshold and proceed
  # true  → reject with `tenant_depth_exceeded` at the same threshold
  depth_strict_mode: false

  # Max parent.depth + 1 admitted by `create_child`. Hard upper bound
  # 1_000_000 (guards the saga's depth arithmetic against silent
  # saturation; `validate()` rejects values above the cap).
  depth_threshold: 10

# =============================================================================
# Retention — soft-delete + hard-delete pipeline
# =============================================================================
# Tick + batch values MUST be > 0 — `tokio::time::interval` panics on
# zero, and `LIMIT 0` would scan zero rows forever. `validate()`
# rejects each at module init rather than crashing the lifecycle task
# on its first tick.
retention:
  # Hard-delete tick — scans rows whose `scheduled_at + retention <= now`
  # and runs the leaf-first cascade.
  tick_secs: 60

  # Default retention window applied at soft-delete time when the
  # caller does not specify one. `0` disables retention (immediate
  # hard-delete eligibility).
  default_window_secs: 7776000   # 90 days

  # Max tenants processed per retention tick.
  hard_delete_batch_size: 64

  # Max parallel hard-delete tasks within a single retention tick.
  # `validate()` rejects 0; the call site additionally clamps `.max(1)`
  # as defense-in-depth for tests that bypass `validate`.
  hard_delete_concurrency: 4

# =============================================================================
# Reaper — provisioning-row compensation pipeline
# =============================================================================
reaper:
  # Reaper tick — compensates rows stuck in `Provisioning` beyond
  # `provisioning_timeout_secs` (claim + status fence applied).
  tick_secs: 30

  # A `Provisioning` row older than this is reaper-eligible.
  # `validate()` rejects `0` (would make every fresh row instantly
  # reaper-eligible and trigger premature compensation).
  provisioning_timeout_secs: 300

  # Max provisioning rows processed per reaper tick.
  batch_size: 64

# =============================================================================
# IdP — external Identity Provider integration policy
# =============================================================================
# `AuthZResolverClient`, `TypesRegistryClient`, `ResourceGroupClient` are
# declared as hard `deps` in `#[modkit::module(...)]` and are ALWAYS
# fail-closed on missing client — there is no config knob for them.
# `IdpPluginClient` is the only optional plugin.
idp:
  # true  → init fails closed when no IdpPluginClient is registered
  #         in `ClientHub` (production posture for deployments that integrate
  #         with an external IdP).
  # false → fall back to NoopIdpProvider; `create_child` returns
  #         `UnsupportedOperation` at runtime if the saga reaches the IdP
  #         step.
  #
  # Default is `false` so dev / test deployments without an IdP plugin keep
  # booting unchanged. Production deployments that need IdP integration MUST
  # set this to `true`.
  required: false

# =============================================================================
# Conversion — managed/self-managed mode-conversion lifecycle
# =============================================================================
# Lifecycle windows for the dual-consent `pending -> {approved, cancelled,
# rejected, expired}` flow. Defaults pinned in
# `cpt-cf-account-management-adr-conversion-approval` (ADR-0003 §1) and
# PRD §5.4. `validate()` rejects every out-of-range value at module init.
conversion:
  # Approval TTL applied at request_conversion time:
  # `expires_at = now() + approval_ttl_secs`. Default 72h.
  # Range: [3600, 2_592_000] (1h to 30d).
  approval_ttl_secs: 259200

  # Resolved-row retention window (approved / cancelled / rejected /
  # expired) before the soft-delete reaper stamps `deleted_at`.
  # Default 30 days. Range: [86_400, 31_536_000] (1d to 365d).
  #
  # CROSS-CHECK: when `retention.default_window_secs > 0`, this value
  # must be <= `retention.default_window_secs`. This ensures
  # resolved-conversion history cannot outlive the tenant row it
  # cascades from (`conversion_requests.tenant_id` is `ON DELETE
  # CASCADE`). When `retention.default_window_secs = 0` (tenant
  # retention disabled), the cross-check is skipped — the FK cascade
  # already reclaims resolved-request rows the instant the tenant is
  # hard-deleted, so any in-range value here is accepted.
  resolved_retention_secs: 2592000

  # Cleanup tick cadence for the dedicated conversion reaper that
  # drives `expire_pending` + `soft_delete_resolved`. Distinct from
  # `retention.tick_secs` (tenant hard-delete pipeline) so an operator
  # tuning tenant retention down does NOT slow conversion expiry along
  # with it. Default 60s. Range: [10, 600] (10s to 10m).
  cleanup_interval_secs: 60

  # Per-tick caps. Both are bounded (`> 0` and below the
  # `ConversionConfig::MAX_BATCH_SIZE = 4_096` ceiling) so the
  # retention sweep's `IN(...)` filter stays well under PG's
  # 65_535-parameter prepared-statement ceiling.
  expire_batch_size: 256
  retention_batch_size: 256
