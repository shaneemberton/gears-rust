# PR Review Configuration
# Generated by Constructor Studio gears kit — edit to match your project.
#
# Resolution order:
#   1. {cf-studio-path}/config/pr-review.toml   (user-editable, this file)
#   2. {scripts}/pr-review.toml  (default)
#
# Paths support {cf-studio-path} variable — resolved at runtime.

data_dir = ".prs"

# ── Prompt entries ────────────────────────────────────────────────
# Each [[prompts]] block maps a review type to a prompt file,
# checklist, and optional project-specific variables.
# The agent selects the best match based on PR content.

[[prompts]]
description = "Code Review"
prompt_file = "{scripts}/prompts/pr/code-review.md"
checklist   = "{codebase_checklist}"
# coding_guidelines = "docs/coding-guidelines.md"
# security_guidelines = "docs/security-guidelines.md"
# gts_guidelines = "guidelines/GTS.md"

[[prompts]]
description = "PRD Review"
prompt_file = "{scripts}/prompts/pr/prd-review.md"
checklist   = "{prd_checklist}"
template    = "{prd_template}"
# project_domain = ""
# existing_artifacts = "docs/prd/"

[[prompts]]
description = "ADR Review"
prompt_file = "{scripts}/prompts/pr/adr-review.md"
checklist   = "{adr_checklist}"
template    = "{adr_template}"
# existing_artifacts = "docs/adr/"

[[prompts]]
description = "Design Review"
prompt_file = "{scripts}/prompts/pr/design-review.md"
checklist   = "{design_checklist}"
template    = "{design_template}"
# architecture = "docs/architecture/"
# gts_guidelines = "guidelines/GTS.md"
